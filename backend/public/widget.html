<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XinT-Panorama-System Widget</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(53, 213, 176, 0.18), transparent 25%),
          linear-gradient(180deg, #07111f 0%, #030712 100%);
        color: #ecf3ff;
      }
      .shell {
        padding: 0;
        width: 100%;
        height: 100%;
      }
      .viewer-shell {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 220px;
        overflow: hidden;
        border-radius: 0;
        background:
          radial-gradient(circle at 50% 40%, rgba(53, 213, 176, 0.08), transparent 22%),
          linear-gradient(180deg, #081321 0%, #030812 100%);
      }
      #viewer {
        width: 100%;
        height: 100%;
      }
      #viewer canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .hud,
      .toolbar {
        position: absolute;
        left: 18px;
        right: 18px;
        z-index: 2;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .hud {
        top: 18px;
      }
      .toolbar {
        bottom: 18px;
      }
      .chip,
      .button {
        min-height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(133, 173, 217, 0.18);
        background: rgba(8, 19, 33, 0.84);
        color: #ecf3ff;
      }
      .button {
        cursor: pointer;
      }
      .button.primary {
        color: #051118;
        border-color: transparent;
        background: linear-gradient(135deg, #35d5b0, #6ef4d6);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="viewer-shell">
        <div id="viewer"></div>
        <div class="hud">
          <span id="statusText" class="chip">加载中...</span>
          <span id="panoramaNoText" class="chip">编号: -</span>
          <span id="resolutionText" class="chip">分辨率: -</span>
        </div>
        <div class="toolbar">
          <button id="prevBtn" class="button" type="button">上一张</button>
          <button id="nextBtn" class="button" type="button">下一张</button>
          <button id="autorotateBtn" class="button primary" type="button">关闭自动旋转</button>
          <button id="resetBtn" class="button" type="button">重置视角</button>
          <button id="fullscreenBtn" class="button" type="button">全屏</button>
        </div>
      </div>
    </div>

    <script src="/assets/three.min.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var apiBase = (params.get("api") || location.origin).replace(/\/$/, "");
        var fixedPanoramaNo = params.get("panoramaNo");
        var externalImageUrl = params.get("imageUrl");
        var externalImageName = params.get("imageName") || "外部全景图";
        var initialAutorotate = params.get("autorotate") !== "0";
        var refs = {
          viewer: document.getElementById("viewer"),
          statusText: document.getElementById("statusText"),
          panoramaNoText: document.getElementById("panoramaNoText"),
          resolutionText: document.getElementById("resolutionText"),
          prevBtn: document.getElementById("prevBtn"),
          nextBtn: document.getElementById("nextBtn"),
          autorotateBtn: document.getElementById("autorotateBtn"),
          resetBtn: document.getElementById("resetBtn"),
          fullscreenBtn: document.getElementById("fullscreenBtn")
        };
        var state = {
          items: [],
          currentIndex: -1,
          autorotate: initialAutorotate,
          yaw: 180,
          pitch: 0,
          fov: 75,
          dragging: false,
          lastX: 0,
          lastY: 0,
          currentTexture: null,
          requestId: 0,
          maxTextureSize: 4096,
          renderer: null,
          scene: null,
          camera: null,
          sphere: null
        };
        var resizeObserver = null;

        initViewer();
        bindEvents();
        loadInitialData();

        function initViewer() {
          state.scene = new THREE.Scene();
          state.camera = new THREE.PerspectiveCamera(75, refs.viewer.clientWidth / Math.max(refs.viewer.clientHeight, 1), 0.1, 1100);
          state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
          if ("outputColorSpace" in state.renderer && THREE.SRGBColorSpace) {
            state.renderer.outputColorSpace = THREE.SRGBColorSpace;
          } else if ("outputEncoding" in state.renderer && THREE.sRGBEncoding) {
            state.renderer.outputEncoding = THREE.sRGBEncoding;
          }
          state.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          state.renderer.setSize(refs.viewer.clientWidth, refs.viewer.clientHeight);
          state.maxTextureSize = state.renderer.capabilities.maxTextureSize || 4096;
          refs.viewer.appendChild(state.renderer.domElement);

          var geometry = new THREE.SphereGeometry(500, 60, 40);
          geometry.scale(-1, 1, 1);
          state.sphere = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0x0c1320 }));
          state.scene.add(state.sphere);
          resetView();
          animate();
        }

        function bindEvents() {
          refs.prevBtn.addEventListener("click", function () { moveSelection(-1); });
          refs.nextBtn.addEventListener("click", function () { moveSelection(1); });
          refs.autorotateBtn.addEventListener("click", toggleAutorotate);
          refs.resetBtn.addEventListener("click", resetView);
          refs.fullscreenBtn.addEventListener("click", toggleFullscreen);
          bindPointerControls();
          window.addEventListener("resize", resizeViewer);
          if (typeof ResizeObserver !== "undefined") {
            resizeObserver = new ResizeObserver(resizeViewer);
            resizeObserver.observe(refs.viewer);
          }
        }

        function bindPointerControls() {
          var canvas = state.renderer.domElement;
          canvas.addEventListener("pointerdown", function (event) {
            state.dragging = true;
            state.lastX = event.clientX;
            state.lastY = event.clientY;
            canvas.setPointerCapture(event.pointerId);
          });
          canvas.addEventListener("pointermove", function (event) {
            if (!state.dragging) {
              return;
            }
            state.yaw -= (event.clientX - state.lastX) * 0.12;
            state.pitch += (event.clientY - state.lastY) * 0.12;
            state.lastX = event.clientX;
            state.lastY = event.clientY;
            clampView();
          });
          function stopDragging(event) {
            state.dragging = false;
            if (event.pointerId !== undefined && canvas.hasPointerCapture(event.pointerId)) {
              canvas.releasePointerCapture(event.pointerId);
            }
          }
          canvas.addEventListener("pointerup", stopDragging);
          canvas.addEventListener("pointercancel", stopDragging);
          canvas.addEventListener("wheel", function (event) {
            event.preventDefault();
            state.fov += event.deltaY * 0.03;
            state.fov = Math.max(35, Math.min(95, state.fov));
            state.camera.fov = state.fov;
            state.camera.updateProjectionMatrix();
          }, { passive: false });
        }

        function loadInitialData() {
          if (externalImageUrl) {
            refs.prevBtn.style.display = "none";
            refs.nextBtn.style.display = "none";
            state.items = [
              {
                id: "external-image",
                panoramaNo: null,
                name: externalImageName,
                sourceType: "external-url",
                viewerUrl: apiBase + "/api/panoramas/proxy?url=" + encodeURIComponent(externalImageUrl),
                thumbnailUrl: apiBase + "/api/panoramas/proxy?url=" + encodeURIComponent(externalImageUrl)
              }
            ];
            selectScene(0);
            return;
          }

          if (fixedPanoramaNo) {
            refs.prevBtn.style.display = "none";
            refs.nextBtn.style.display = "none";
            fetch(apiBase + "/api/panoramas/by-no?no=" + encodeURIComponent(fixedPanoramaNo))
              .then(toJson)
              .then(function (payload) {
                state.items = payload.item ? [payload.item] : [];
                if (!state.items.length) {
                  throw new Error("not found");
                }
                selectScene(0);
              })
              .catch(function () {
                refs.statusText.textContent = "指定编号的全景图不存在";
              });
            return;
          }

          fetch(apiBase + "/api/gallery")
            .then(toJson)
            .then(function (payload) {
              state.items = payload.items || [];
              if (!state.items.length) {
                refs.statusText.textContent = "暂无可用全景图";
                return;
              }
              selectScene(0);
            })
            .catch(function () {
              refs.statusText.textContent = "后端不可用";
            });
        }

        function toJson(response) {
          if (!response.ok) {
            throw new Error("request failed");
          }
          return response.json();
        }

        function selectScene(index) {
          if (index < 0 || index >= state.items.length) {
            return;
          }

          var item = state.items[index];
          var requestId = ++state.requestId;
          state.currentIndex = index;
          refs.statusText.textContent = "加载中...";
          refs.panoramaNoText.textContent = item.panoramaNo ? "编号: #" + item.panoramaNo : "来源: 外部 URL";

          loadTexture(item.viewerUrl)
            .then(function (loaded) {
              if (requestId !== state.requestId) {
                loaded.texture.dispose();
                return;
              }

              if (state.currentTexture) {
                state.currentTexture.dispose();
              }

              state.currentTexture = loaded.texture;
              state.sphere.material.map = loaded.texture;
              state.sphere.material.color.setHex(0xffffff);
              state.sphere.material.needsUpdate = true;
              refs.resolutionText.textContent = "分辨率: " + loaded.originalWidth + " × " + loaded.originalHeight;
              refs.statusText.textContent = "已就绪: " + item.name;
            })
            .catch(function () {
              resetSurface();
              refs.statusText.textContent = "加载失败";
            });
        }

        function loadTexture(url) {
          return loadImageSource(url).then(function (source) {
            var originalWidth = source.naturalWidth || source.width;
            var originalHeight = source.naturalHeight || source.height;
            var scale = Math.min(1, Math.max(1024, state.maxTextureSize || 4096) / Math.max(originalWidth, originalHeight));
            var scaledWidth = Math.max(1, Math.round(originalWidth * scale));
            var scaledHeight = Math.max(1, Math.round(originalHeight * scale));
            var canvas = document.createElement("canvas");
            var context = canvas.getContext("2d", { alpha: false, desynchronized: true });
            var texture;

            canvas.width = scaledWidth;
            canvas.height = scaledHeight;
            context.drawImage(source, 0, 0, scaledWidth, scaledHeight);
            texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = false;
            if ("colorSpace" in texture && THREE.SRGBColorSpace) {
              texture.colorSpace = THREE.SRGBColorSpace;
            } else if ("encoding" in texture && THREE.sRGBEncoding) {
              texture.encoding = THREE.sRGBEncoding;
            }
            texture.needsUpdate = true;

            if (typeof source.close === "function") {
              source.close();
            }

            return {
              texture: texture,
              originalWidth: originalWidth,
              originalHeight: originalHeight
            };
          });
        }

        function loadImageSource(url) {
          if (typeof createImageBitmap === "function") {
            return fetch(url, { mode: "cors", cache: "no-cache" })
              .then(function (response) {
                if (!response.ok) {
                  throw new Error("image fetch failed");
                }
                return response.blob();
              })
              .then(function (blob) {
                return createImageBitmap(blob);
              })
              .catch(function () {
                return loadImageElement(url);
              });
          }
          return loadImageElement(url);
        }

        function loadImageElement(url) {
          return new Promise(function (resolve, reject) {
            var image = new Image();
            image.crossOrigin = "anonymous";
            image.decoding = "async";
            image.onload = function () { resolve(image); };
            image.onerror = function () { reject(new Error("image failed")); };
            image.src = url;
          });
        }

        function moveSelection(delta) {
          if (fixedPanoramaNo || !state.items.length) {
            return;
          }
          selectScene((state.currentIndex + delta + state.items.length) % state.items.length);
        }

        function toggleAutorotate() {
          state.autorotate = !state.autorotate;
          refs.autorotateBtn.textContent = state.autorotate ? "关闭自动旋转" : "开启自动旋转";
        }

        function resetView() {
          state.yaw = 180;
          state.pitch = 0;
          state.fov = 75;
          state.camera.fov = state.fov;
          state.camera.updateProjectionMatrix();
        }

        function toggleFullscreen() {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
          } else {
            document.exitFullscreen();
          }
        }

        function resizeViewer() {
          state.camera.aspect = refs.viewer.clientWidth / Math.max(refs.viewer.clientHeight, 1);
          state.camera.updateProjectionMatrix();
          state.renderer.setSize(refs.viewer.clientWidth, refs.viewer.clientHeight);
        }

        function animate() {
          window.requestAnimationFrame(animate);
          if (state.autorotate && !state.dragging) {
            state.yaw += 0.025;
          }
          clampView();
          var phi = THREE.MathUtils.degToRad(90 - state.pitch);
          var theta = THREE.MathUtils.degToRad(state.yaw);
          var radius = 500;
          var target = new THREE.Vector3(
            radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
          );
          state.camera.lookAt(target);
          state.renderer.render(state.scene, state.camera);
        }

        function clampView() {
          state.pitch = Math.max(-85, Math.min(85, state.pitch));
        }

        function resetSurface() {
          if (state.currentTexture) {
            state.currentTexture.dispose();
            state.currentTexture = null;
          }
          state.sphere.material.map = null;
          state.sphere.material.color.setHex(0x0c1320);
          state.sphere.material.needsUpdate = true;
          refs.resolutionText.textContent = "分辨率: -";
        }

      })();
    </script>
  </body>
</html>
